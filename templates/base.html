<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ meta.title if meta and meta.title else "REIS BARÃO - IMÓVEIS À VENDA E LOCAÇÃO" }}</title>
  <meta name="description" content="{{ meta.description if meta and meta.description else 'REIS BARÃO - Imóveis à venda e locação em Salvador e Rio de Janeiro.' }}">
  <link rel="canonical" href="{{ meta.canonical if meta and meta.canonical else request.url }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ meta.title if meta and meta.title else 'REIS BARÃO - IMÓVEIS À VENDA E LOCAÇÃO' }}">
  <meta property="og:description" content="{{ meta.description if meta and meta.description else 'Imóveis à venda e locação em Salvador e Rio de Janeiro.' }}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ meta.og_image if meta and meta.og_image else url_for('static', filename='img/og-default.jpg', _external=True) }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet">
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg fixed-top navbar-glass" id="mainNavbar">
      <div class="container">
        <a class="navbar-brand brand-luxury" href="{{ url_for('index') }}">REIS BARÃO</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuMain">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuMain">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}#vitrine">Imóveis</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}#filtros">Busca</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('admin') }}">Admin</a></li>
            <li class="nav-item ms-lg-2"><a class="btn btn-cta-sm" href="https://wa.me/5571981330465" target="_blank" rel="noopener">Atendimento VIP</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer-luxury py-5">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
      <p class="mb-0">&copy; {{ current_year }} REIS BARÃO - IMÓVEIS À VENDA E LOCAÇÃO.</p>
      <p class="mb-0">Salvador e Rio de Janeiro com atendimento comercial direto.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const navbar = document.getElementById('mainNavbar');
    const onScroll = () => {
      if (!navbar) return;
      navbar.classList.toggle('navbar-scrolled', window.scrollY > 28);
    };
    document.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
